<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Solidum • вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #03060c;
            background-image: radial-gradient(circle at 15% 10%, #0a1120 0%, #010307 100%);
            font-family: 'Inter', 'Segoe UI', system-ui, 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            max-width: 340px;
            width: 100%;
        }

        .brand {
            margin-bottom: 32px;
            text-align: center;
        }

        .brand-panel {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 2.2px;
            text-transform: uppercase;
            color: #7a89a0;
            text-shadow: 0 0 4px #2a4568;
            margin-bottom: 5px;
        }

        .brand-solidum {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #bedcff;
            text-shadow: 0 0 12px #2f7eff, 0 0 4px #5ea6ff;
            line-height: 1.05;
        }

        .login-card {
            background: rgba(4, 12, 22, 0.9);
            backdrop-filter: blur(2px);
            border-radius: 28px;
            padding: 28px 22px;
            border: 1px solid rgba(48, 140, 255, 0.4);
            box-shadow: 0 0 16px rgba(48, 140, 255, 0.3);
        }

        .login-title {
            font-size: 18px;
            font-weight: 600;
            color: #c0dcff;
            text-shadow: 0 0 4px #2f7eff;
            margin-bottom: 24px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            background: rgba(10, 20, 35, 0.8);
            border: 1px solid rgba(48, 140, 255, 0.5);
            border-radius: 18px;
            padding: 14px 18px;
            font-size: 16px;
            color: #e0f0ff;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
        }

        .input-group input:focus {
            border-color: #3a9eff;
            box-shadow: 0 0 10px rgba(58, 158, 255, 0.4);
        }

        .input-group input::placeholder {
            color: #5a6e8a;
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #1a4a8a, #0e2a50);
            border: 1px solid rgba(72, 160, 255, 0.6);
            border-radius: 24px;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            color: #d0f0ff;
            text-shadow: 0 0 3px #2f7eff;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .login-btn:hover {
            background: linear-gradient(135deg, #2a5a9a, #1a3a6a);
            box-shadow: 0 0 12px rgba(48, 140, 255, 0.5);
            border-color: #5ab0ff;
        }

        .error-msg {
            color: #ff8a8a;
            text-shadow: 0 0 3px #ff3a3a;
            font-size: 12px;
            text-align: center;
            margin-top: 16px;
            min-height: 32px;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="brand">
        <div class="brand-panel">Panel</div>
        <div class="brand-solidum">Solidum</div>
    </div>
    <div class="login-card">
        <div class="login-title">ДОСТУП К ПОДПИСКАМ</div>
        <div class="input-group">
            <input type="password" id="passwordInput" placeholder="Введите пароль" autocomplete="off">
        </div>
        <button class="login-btn" id="loginBtn">ВОЙТИ</button>
        <div class="error-msg" id="errorMsg"></div>
    </div>
</div>

<script>
    const CORRECT_PASSWORD = 'Saha140612';
    const SESSION_KEY = 'solidum_auth';

    function checkAuth() {
        if (sessionStorage.getItem(SESSION_KEY) === 'true') {
            window.location.href = '/sub/VYKZ';
        }
    }

    function login() {
        const pwd = document.getElementById('passwordInput').value;
        const errorMsg = document.getElementById('errorMsg');
        if (pwd === CORRECT_PASSWORD) {
            sessionStorage.setItem(SESSION_KEY, 'true');
            window.location.href = '/sub/VYKZ';
        } else {
            errorMsg.textContent = 'Неверный пароль';
            document.getElementById('passwordInput').value = '';
        }
    }

    document.getElementById('loginBtn').addEventListener('click', login);
    document.getElementById('passwordInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') login();
    });

    checkAuth();
</script>
</body>
</html>
